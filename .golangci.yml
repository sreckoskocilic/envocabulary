version: "2"
run:
  tests: true
linters:
  default: none
  enable:
    - bodyclose
    - copyloopvar
    - errcheck
    - errorlint
    - exhaustive
    - gocognit
    - gocritic
    - gocyclo
    - godot
    - gosec
    - govet
    - ineffassign
    - misspell
    - nakedret
    - nilerr
    - prealloc
    - predeclared
    - revive
    - staticcheck
    - thelper
    - unconvert
    - unparam
    - unused
    - whitespace
  settings:
    errcheck:
      check-type-assertions: true
      check-blank: false
    exhaustive:
      default-signifies-exhaustive: true
    gocognit:
      min-complexity: 25
    gocritic:
      disabled-checks:
        - ifElseChain
        - hugeParam
      enabled-tags:
        - diagnostic
        - performance
        - style
    gocyclo:
      min-complexity: 15
    godot:
      scope: declarations
      capital: false
    misspell:
      locale: US
    nakedret:
      max-func-lines: 10
    revive:
      severity: warning
      rules:
        - name: var-naming
        - name: error-return
        - name: error-naming
        - name: error-strings
        - name: errorf
        - name: indent-error-flow
        - name: blank-imports
        - name: context-as-argument
        - name: dot-imports
        - name: increment-decrement
        - name: range
        - name: receiver-naming
        - name: unexported-return
        - name: var-declaration
        - name: unreachable-code
        - name: redefines-builtin-id
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - errcheck
          - gocognit
          - gocyclo
          - gosec
        path: _test\.go
      - linters:
          - funlen
          - gocognit
          - gocyclo
        path: cmd/envocabulary/main\.go
    paths:
      - dist
      - vendor
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  enable:
    - gofumpt
    - goimports
  settings:
    gofumpt:
      extra-rules: true
  exclusions:
    generated: lax
    paths:
      - dist
      - vendor
      - third_party$
      - builtin$
      - examples$
