name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.24'
      - uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.8
          args: --timeout=5m

  test:
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.24'
      - run: go build ./...
      - run: go vet ./...
      - name: Run tests with coverage
        run: go test -race -covermode=atomic -coverprofile=coverage.out ./...
      - name: Coverage threshold gate (testable surface, matches codecov badge)
        run: |
          grep -v '/external\.go:\|_external\.go:' coverage.out > coverage.gated.out
          full=$(go tool cover -func=coverage.out | awk '/total:/ {gsub(/%/,"",$3); print $3}')
          gated=$(go tool cover -func=coverage.gated.out | awk '/total:/ {gsub(/%/,"",$3); print $3}')
          echo "Coverage — full (incl. *_external.go): ${full}% | gated (testable surface): ${gated}%"
          if awk -v g=$gated -v m=95 'BEGIN { exit (g+0 < m+0) ? 1 : 0 }'; then
            echo "✓ gated coverage ${gated}% meets minimum 95%"
          else
            echo "✗ gated coverage ${gated}% is below minimum 95%"
            exit 1
          fi
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage.out
          disable_search: true
          fail_ci_if_error: false
          verbose: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
